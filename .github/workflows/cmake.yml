name: CMake

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          cmake --build .

#      - name: Verify build directory
#        run: |
#          cd build
#          dir

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asm-analyze-win-x64
          path: build\Debug\asm-analyze.exe
